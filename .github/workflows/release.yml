name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false

      - name: Download dependencies
        run: go mod tidy

      # ── Linux ────────────────────────────────────────────────────────────────
      - name: Build Linux (amd64)
        run: |
          GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w" \
            -o dist/benchlib-agent-linux-amd64 \
            ./cmd/agent

      # ── macOS ────────────────────────────────────────────────────────────────
      - name: Build macOS (amd64)
        run: |
          GOOS=darwin GOARCH=amd64 go build \
            -ldflags="-s -w" \
            -o dist/benchlib-agent-macos-amd64 \
            ./cmd/agent

      - name: Build macOS (arm64 — Apple Silicon)
        run: |
          GOOS=darwin GOARCH=arm64 go build \
            -ldflags="-s -w" \
            -o dist/benchlib-agent-macos-arm64 \
            ./cmd/agent

      # ── Windows Systray ──────────────────────────────────────────────────────
      - name: Build Windows Systray (amd64)
        run: |
          GOOS=windows GOARCH=amd64 go build \
            -ldflags="-s -w -H windowsgui" \
            -o dist/benchlib-agent-tray-windows-amd64.exe \
            ./cmd/tray

      # ── Release "latest" (push sur main uniquement) ──────────────────────────
      - name: Update release "latest"
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          prerelease: true
          body: |
            Build automatique du dernier commit sur `main`.

            | Fichier | Plateforme |
            |---------|------------|
            | `benchlib-agent-linux-amd64` | Linux x64 |
            | `benchlib-agent-macos-amd64` | macOS Intel |
            | `benchlib-agent-macos-arm64` | macOS Apple Silicon (M1/M2/M3) |
            | `benchlib-agent-tray-windows-amd64.exe` | Windows x64 (systray) |
          files: |
            dist/benchlib-agent-linux-amd64
            dist/benchlib-agent-macos-amd64
            dist/benchlib-agent-macos-arm64
            dist/benchlib-agent-tray-windows-amd64.exe

      # ── Release versionnée (tag v*) ───────────────────────────────────────────
      - name: Create versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          prerelease: false
          body: |
            ## BenchLib Agent ${{ github.ref_name }}

            | Fichier | Plateforme |
            |---------|------------|
            | `benchlib-agent-linux-amd64` | Linux x64 |
            | `benchlib-agent-macos-amd64` | macOS Intel |
            | `benchlib-agent-macos-arm64` | macOS Apple Silicon (M1/M2/M3) |
            | `benchlib-agent-tray-windows-amd64.exe` | Windows x64 (systray) |
          files: |
            dist/benchlib-agent-linux-amd64
            dist/benchlib-agent-macos-amd64
            dist/benchlib-agent-macos-arm64
            dist/benchlib-agent-tray-windows-amd64.exe

  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
