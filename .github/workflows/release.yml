name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download dependencies
        run: go mod tidy

      # ── Linux ────────────────────────────────────────────────────────────────
      - name: Build Linux (amd64)
        run: |
          GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w" \
            -o dist/benchlib-agent-linux-amd64 \
            ./cmd/agent

      # ── Windows CLI ──────────────────────────────────────────────────────────
      - name: Build Windows CLI (amd64)
        run: |
          GOOS=windows GOARCH=amd64 go build \
            -ldflags="-s -w" \
            -o dist/benchlib-agent-windows-amd64.exe \
            ./cmd/agent

      # ── Windows Systray ──────────────────────────────────────────────────────
      - name: Build Windows Systray (amd64)
        run: |
          GOOS=windows GOARCH=amd64 go build \
            -ldflags="-s -w -H windowsgui" \
            -o dist/benchlib-agent-tray-windows-amd64.exe \
            ./cmd/tray

      # ── Release "latest" ─────────────────────────────────────────────────────
      - name: Update release "latest"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          prerelease: true
          body: |
            Build automatique du dernier commit sur `main`.

            | Fichier | Plateforme |
            |---------|------------|
            | `benchlib-agent-linux-amd64` | Linux x64 |
            | `benchlib-agent-windows-amd64.exe` | Windows x64 (CLI) |
            | `benchlib-agent-tray-windows-amd64.exe` | Windows x64 (systray) |
          files: |
            dist/benchlib-agent-linux-amd64
            dist/benchlib-agent-windows-amd64.exe
            dist/benchlib-agent-tray-windows-amd64.exe
